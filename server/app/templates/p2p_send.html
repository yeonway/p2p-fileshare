<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#145A64">
    <title>P2P 파일 보내기 - send honey where</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/static/css/style.css?v=send-honey-where">
</head>
<body class="app-page">
    <header class="site-nav">
        <a class="brand" href="/" aria-label="send honey where 홈">
            <span class="brand-mark" aria-hidden="true"></span>
            <span class="brand-text">send honey where</span>
        </a>
        <nav class="nav-links" aria-label="주요 이동">
            <a href="/p2p/receive">P2P 받기</a>
            <a href="/send">기본 보내기</a>
        </nav>
    </header>
    <main class="shell app-shell">
        <section class="page-heading">
            <p class="eyebrow">Hidden P2P mode</p>
            <h1>P2P 파일 보내기</h1>
            <p class="muted">서버 저장 없이 WebRTC DataChannel로 직접 전송합니다. 양쪽 화면이 열려 있어야 합니다.</p>
        </section>
        <section class="panel">
            <div class="panel-heading">
                <div>
                    <span class="label">Step 1</span>
                    <h2>전송할 파일 선택</h2>
                </div>
                <span class="panel-badge">P2P</span>
            </div>
            <div class="field">
                <label for="fileInput">보낼 파일</label>
                <input id="fileInput" type="file">
            </div>
            <button id="createRoomButton" class="button primary" type="button">
                <span class="button-icon" aria-hidden="true">+</span>
                6자리 코드 생성
            </button>
            <p id="errorText" class="error" role="alert"></p>
        </section>
        <section id="transferPanel" class="panel hidden">
            <div class="code-row">
                <div>
                    <span class="label">6자리 코드</span>
                    <strong id="roomCode" class="code">------</strong>
                </div>
                <div>
                    <span class="label">새 접속 가능 시간</span>
                    <strong id="ttlText">--:--</strong>
                </div>
            </div>
            <div id="qrPanel" class="qr-panel hidden">
                <div id="qrCode" class="qr-code" aria-label="P2P 받기 링크 QR"></div>
                <div class="qr-copy">
                    <strong>QR로 받기 열기</strong>
                    <span>P2P 모드 QR입니다.</span>
                    <a id="shareLink" href="#" target="_blank" rel="noreferrer">웹 링크</a>
                </div>
            </div>
            <dl class="status-grid">
                <div><dt>파일</dt><dd id="fileNameText">-</dd></div>
                <div><dt>크기</dt><dd id="fileSizeText">-</dd></div>
                <div><dt>수신자</dt><dd id="receiverStatusText">대기 중</dd></div>
                <div><dt>WebRTC</dt><dd id="rtcStatusText">대기 중</dd></div>
                <div><dt>연결 경로</dt><dd id="pathStatusText">확인 전</dd></div>
                <div><dt>상태</dt><dd id="transferStatusText">대기 중</dd></div>
            </dl>
            <div class="progress-wrap">
                <progress id="progressBar" value="0" max="100"></progress>
                <div class="progress-meta">
                    <span id="progressText">0%</span>
                    <span id="speedText">0 B/s</span>
                    <span id="etaText">남은 시간 -</span>
                </div>
            </div>
        </section>
    </main>
    <script src="/static/js/common.js?v=send-honey-where-6"></script>
    <script src="/static/js/webrtc_protocol.js?v=send-honey-where-6"></script>
    <script src="/static/js/send.js?v=send-honey-where-7"></script>
</body>
</html>
