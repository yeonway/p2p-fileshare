<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Raspberry Pi P2P File Share</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <main class="shell home">
        <section class="hero">
            <p class="eyebrow">P2P File Share</p>
            <h1>Raspberry Pi P2P File Share</h1>
            <p>파일은 서버에 저장되지 않고 기기끼리 직접 전송됩니다.</p>
            <div class="actions">
                <a class="button primary" href="/send">파일 보내기</a>
                <a class="button" href="/receive">파일 받기</a>
            </div>
        </section>
        <section class="note-band">
            <p>동영상은 압축되지 않고 원본 그대로 전송됩니다.</p>
            <p>직접 연결이 어려운 경우 중계 경로를 사용할 수 있습니다. 그래도 파일은 저장되지 않습니다.</p>
        </section>
    </main>
</body>
</html>
